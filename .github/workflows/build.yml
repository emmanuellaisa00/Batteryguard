name: Build BatteryGuard APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          BUILD_TIME=$(date +%Y%m%d_%H%M)
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          [ -n "$DEBUG_APK" ] && mv "$DEBUG_APK" "app/build/outputs/apk/debug/BatteryGuard_debug_${BUILD_TIME}.apk"
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          [ -n "$RELEASE_APK" ] && mv "$RELEASE_APK" "app/build/outputs/apk/release/BatteryGuard_release_${BUILD_TIME}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: BatteryGuard-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: BatteryGuard-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BatteryGuard-Debug-APK/*.apk
            artifacts/BatteryGuard-Release-APK/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
